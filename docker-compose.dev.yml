version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: personal_assist_db
    restart: always

    environment:
      POSTGRES_DB: personal_assist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123

    ports:
      - "5436:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    networks:
      - personal_assist_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: personal_assist_mailpit
    restart: always

    ports:
      - "8025:8025"
      - "1025:1025"

    networks:
      - personal_assist_network

volumes:
  pgdata:

networks:
  personal_assist_network:
